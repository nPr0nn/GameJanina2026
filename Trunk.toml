[build]
target = "index.html"
# Emit *relative* asset URLs (`./game-….js` instead of `/game-….js`). Hosts like
# itch.io serve the uploaded zip from a sub-path, so absolute `/…` URLs resolve
# to the domain root and 404. Relative URLs work both there and under
# `trunk serve` (served from `/`).
public_url = "./"

[serve]
# Bind an explicit loopback address. Trunk otherwise advertises
# `http://localhost.:8080/` (note the trailing dot) which some browsers refuse
# to connect to. Open http://127.0.0.1:8080 in your browser.
addresses = ["127.0.0.1"]
port = 8080
open = false
